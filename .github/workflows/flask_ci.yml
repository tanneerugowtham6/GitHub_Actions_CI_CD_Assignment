name: Flask CI Pipeline

on:
  push:
    branches:
      - staging
    tags:
      - 'v*'
  pull_request:

jobs:
  # CI Job to build and test the application
  build-and-test:
    runs-on: ubuntu-latest
    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}

    steps:
      - name: Code checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          pip install pytest
          pytest

  staging-deployment:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    needs: build-and-test

    if: github.ref == 'refs/heads/staging'

    env:
      STAGING: ${{ secrets.STAGING_HOST }}
      MONGO_URI: ${{ secrets.MONGO_URI }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}

    steps:
      - name: Configuring ssh-agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H $STAGING >> ~/.ssh/known_hosts
      
      - name: Deploy to Staging environment
        run: |
          ssh ubuntu@$STAGING << EOF
            set -e
            cd /home/ubuntu
            if [ -d "app/.git" ]; then
              echo "App directory exists. Pulling latest changes..."
              cd app
              git fetch origin
              git reset --hard origin/staging
            else
              echo "App directory does not exist. Cloning repository..."
              git clone git@github.com:tanneerugowtham6/GitHub_Actions_CI_CD_Assignment.git app
              cd app
            fi
            echo "MONGO_URI=${{ secrets.MONGO_URI }}" > .env
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
            /home/ubuntu/venv/bin/pip install -r requirements.txt
            sudo systemctl restart flask-app
          EOF
      
  production-deployment:
    name: Deploy to Production Environment
    runs-on: ubuntu-latest
    needs: build-and-test

    if: startsWith(github.ref, 'refs/tags/v')

    env:
      PROD: ${{ secrets.PRODUCTION_HOST }}
      MONGO_URI: ${{ secrets.MONGO_URI }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}

    steps:
      - name: Configuring ssh-agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H $PROD >> ~/.ssh/known_hosts

      - name: Deploy to Production Environment
        run: |
          ssh ubuntu@PROD << EOF
            set -e
            cd /home/ubuntu
            if [ -d "app/.git" ]; then
              echo "App directory exists. Pulling latest changes..."
              cd app
              git pull origin main
            fi
            else
              echo "App directory does not exist. Cloning repository..."
              git clone git@github.com:tanneerugowtham6/GitHub_Actions_CI_CD_Assignment.git app
            fi
            cd app
            echo "MONGO_URI=${{ secrets.MONGO_URI }}" > .env
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
            /home/ubuntu/venv/bin/pip install -r requirements.txt
            sudo systemctl restart flask-app
          EOF