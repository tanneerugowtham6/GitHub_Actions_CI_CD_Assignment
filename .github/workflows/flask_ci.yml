name: Flask CI Pipeline

on:
  push:
    branches:
      - main
      - staging
  pull_request:

jobs:
  build_and_test:
    runs-on: ubuntu_latest
    
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          pip install pytest
          pytest